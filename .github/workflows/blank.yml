name: Scaffold Services

on:
  workflow_dispatch:
    inputs:
      services:
        description: '생성할 서비스(쉼표구분) 또는 all'
        required: true
        default: 'all'
      overwrite:
        description: '덮어쓰기'
        type: boolean
        default: false
      mode:
        description: '반영 방식'
        type: choice
        options: [ commit, pull_request ]
        default: commit
      target_branch:
        required: false
        default: 'scaffold/services'

permissions:
  contents: write
  pull-requests: write

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Generate files
        shell: bash
        env:
          SERVICES: ${{ github.event.inputs.services }}
          OVERWRITE: ${{ github.event.inputs.overwrite }}
        run: |
          set -euo pipefail
          want() { [ "$SERVICES" = "all" ] && return 0; echo ",$SERVICES," | grep -q ",$1,"; }
          emit() {
            local path="$1" b64="$2"
            if [ -f "$path" ] && [ "$OVERWRITE" != "true" ]; then echo "skip  $path"; return; fi
            mkdir -p "$(dirname "$path")"; printf "%s" "$b64" | base64 -d > "$path"; echo "write $path"
          }
          if want unified; then
            emit "unified-app/.gitignore" "LmdyYWRsZS8KYnVpbGQvCm91dC8K"
            emit "unified-app/README.md" ""
            emit "unified-app/build.gradle" ""
            emit "unified-app/gradle/wrapper/gradle-wrapper.properties" ""
            emit "unified-app/gradlew" ""
            emit "unified-app/gradlew.bat" ""
            emit "unified-app/run.sh" "IyEvdXNyL2Jpbi9lbnYgYmFzaAojIO2Gte2VqSDslbEg7Iuk7ZaJOiAuL3J1bi5zaCBbc3RhdHVzfGFuYWx5emV8bW9uaXRvcnxzZXJ2ZXxoZWxwXQpzZXQgLWUKY2QgIiQoZGlybmFtZSAiJDAiKSIKY2htb2QgK3ggZ3JhZGxldwouL2dyYWRsZXcgaW5zdGFsbERpc3QgLS1uby1kYWVtb24gLXEKZXhlYyBidWlsZC9pbnN0YWxsL3VuaWZpZWQtYXBwL2Jpbi91bmlmaWVkLWFwcCAiJEAiCg=="
            emit "unified-app/settings.gradle" "cm9vdFByb2plY3QubmFtZSA9ICd1bmlmaWVkLWFwcCcK"
            emit "unified-app/src/main/java/com/example/unified/Analyzer.java" ""
            emit "unified-app/src/main/java/com/example/unified/DashboardServer.java" ""
            emit "unified-app/src/main/java/com/example/unified/SystemProbe.java" ""
            emit "unified-app/src/main/java/com/example/unified/UnifiedApp.java" ""
            emit "unified-app/src/test/java/com/example/unified/UnifiedTest.java" ""
          fi
          if want mcp; then
            emit "mcp-system-monitor-server/.gitignore" "LmdyYWRsZS8KYnVpbGQvCiouY2xhc3MKLmlkZWEvCiouaW1sCi5EU19TdG9yZQo="
