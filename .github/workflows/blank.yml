name: Scaffold Services

# 각 서비스의 모든 파일을 대량 생성하고 PR로 올리는 워크플로.
# Actions 탭 > "Run workflow" 실행. (services: all 또는 mcp,plugin,noc,exchange)

on:
  workflow_dispatch:
    inputs:
      services:
        description: '생성할 서비스(쉼표구분) 또는 all'
        required: true
        default: 'all'
      overwrite:
        description: '이미 있으면 덮어쓰기'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Generate files
        shell: bash
        env:
          SERVICES: ${{ github.event.inputs.services }}
          OVERWRITE: ${{ github.event.inputs.overwrite }}
        run: |
          set -euo pipefail
          want() { [ "$SERVICES" = "all" ] && return 0; echo ",$SERVICES," | grep -q ",$1,"; }
          emit() {
            local path="$1" b64="$2"
            if [ -f "$path" ] && [ "$OVERWRITE" != "true" ]; then echo "skip  $path"; return; fi
            mkdir -p "$(dirname "$path")"
            printf "%s" "$b64" | base64 -d > "$path"; echo "write $path"
          }
          if want mcp; then
            emit "mcp-system-monitor-server/.gitignore" "LmdyYWRsZS8KYnVpbGQvCiouY2xhc3MKLmlkZWEvCiouaW1sCi5EU19TdG9yZQo="
            emit "mcp-system-monitor-server/CHANGELOG.md" "IyBDaGFuZ2Vsb2cKCiMjIFswLjEuMF0KLSBNQ1Agc3RkaW8g7ISc67KEIChpbml0aWFsaXplIC8gdG9vbHMvbGlzdCAvIHRvb2xzL2NhbGwpCi0g64+E6rWsOiBzeXN0ZW1fc3RhdHVzLCBkaXNrX3N0YXR1cywgcG9ydF9jaGVjaywgZWNobwotIEdpdEh1YiBBY3Rpb25zIENJLCDri6jsnIQg7YWM7Iqk7Yq4Cg=="
            emit "mcp-system-monitor-server/Dockerfile" ""
            emit "mcp-system-monitor-server/README.md" ""
            emit "mcp-system-monitor-server/build.gradle" ""
            emit "mcp-system-monitor-server/config/mcp-config.example.json" "ewogICJtY3BTZXJ2ZXJzIjogewogICAgInN5c3RlbS1tb25pdG9yIjogewogICAgICAiY29tbWFuZCI6ICI8cmVwbz4vYnVpbGQvaW5zdGFsbC9tY3Atc3lzdGVtLW1vbml0b3Itc2VydmVyL2Jpbi9tY3Atc3lzdGVtLW1vbml0b3Itc2VydmVyIgogICAgfQogIH0KfQo="
            emit "mcp-system-monitor-server/gradle/wrapper/gradle-wrapper.properties" ""
            emit "mcp-system-monitor-server/gradlew" ""
            emit "mcp-system-monitor-server/gradlew.bat" ""
            emit "mcp-system-monitor-server/settings.gradle" "cm9vdFByb2plY3QubmFtZSA9ICdtY3Atc3lzdGVtLW1vbml0b3Itc2VydmVyJwo="
            emit "mcp-system-monitor-server/src/main/java/com/example/mcp/McpServer.java" ""
            emit "mcp-system-monitor-server/src/main/java/com/example/mcp/Tool.java" ""
            emit "mcp-system-monitor-server/src/main/java/com/example/mcp/ToolRegistry.java" ""
            emit "mcp-system-monitor-server/src/main/java/com/example/mcp/tools/DiskStatusTool.java" ""
            emit "mcp-system-monitor-server/src/main/java/com/example/mcp/tools/EchoTool.java" ""
            emit "mcp-system-monitor-server/src/main/java/com/example/mcp/tools/PortCheckTool.java" ""
            emit "mcp-system-monitor-server/src/main/java/com/example/mcp/tools/SystemStatusTool.java" ""
            emit "mcp-system-monitor-server/src/test/java/com/example/mcp/McpServerTest.java" ""
            emit "mcp-system-monitor-server/src/test/java/com/example/mcp/ToolsTest.java" ""
          fi
          if want plugin; then
            emit "intellij-system-monitor-plugin/.gitignore" "LmdyYWRsZS8KYnVpbGQvCi5pZGVhLwoqLmltbAo="
            emit "intellij-system-monitor-plugin/README.md" ""
            emit "intellij-system-monitor-plugin/build.gradle" ""
            emit "intellij-system-monitor-plugin/gradle/wrapper/gradle-wrapper.properties" ""
            emit "intellij-system-monitor-plugin/gradlew" ""
            emit "intellij-system-monitor-plugin/gradlew.bat" ""
            emit "intellij-system-monitor-plugin/settings.gradle" "cm9vdFByb2plY3QubmFtZSA9ICdpbnRlbGxpai1zeXN0ZW0tbW9uaXRvci1wbHVnaW4nCg=="
            emit "intellij-system-monitor-plugin/src/main/java/com/example/plugin/AiAnalyzer.java" ""
            emit "intellij-system-monitor-plugin/src/main/java/com/example/plugin/AnalyzeAction.java" ""
            emit "intellij-system-monitor-plugin/src/main/java/com/example/plugin/SystemStatusAction.java" ""
            emit "intellij-system-monitor-plugin/src/main/java/com/example/plugin/SystemStatusService.java" ""
            emit "intellij-system-monitor-plugin/src/main/resources/META-INF/plugin.xml" ""
          fi
          if want noc; then
            emit "noc-dashboard/README.md" ""
            emit "noc-dashboard/api.js" ""
            emit "noc-dashboard/app.js" ""
            emit "noc-dashboard/data.js" ""
            emit "noc-dashboard/index.html" ""
            emit "noc-dashboard/package.json" "ewogICJuYW1lIjogIm5vYy1kYXNoYm9hcmQiLAogICJ2ZXJzaW9uIjogIjAuMS4wIiwKICAicHJpdmF0ZSI6IHRydWUsCiAgInNjcmlwdHMiOiB7CiAgICAibGludCI6ICJodG1saGludCAqKi8qLmh0bWwiLAogICAgInNlcnZlIjogIm5weCBzZXJ2ZSAuIgogIH0sCiAgImRldkRlcGVuZGVuY2llcyI6IHsgImh0bWxoaW50IjogIl4xLjEuNCIgfQp9Cg=="
            emit "noc-dashboard/style.css" ""
          fi
          if want exchange; then
            emit "exchange-rate-web/README.md" "IyDtmZjsnKgg7KCV67O0IOybuSAoVVNEL0tSVykKCkZyYW5rZnVydGVyIEFQSeuhnCDsi6Tsi5zqsIQg7ZmY7Jyo7J2EIOyhsO2ajMK367OA7ZmY7ZWY64qUIOygleyggSDsm7kuCgojIyDsi6TtlokKYGluZGV4Lmh0bWxg7J2EIOu4jOudvOyasOyggOuhnCDsl7TrqbQg65Cp64uI64ukLiAoQVBJIO2CpCDrtojtlYTsmpQpCg=="
            emit "exchange-rate-web/app.js" ""
            emit "exchange-rate-web/converter.js" ""
            emit "exchange-rate-web/currencies.js" "ZXhwb3J0IGNvbnN0IENVUlJFTkNJRVMgPSBbIlVTRCIsICJLUlciLCAiRVVSIiwgIkpQWSIsICJHQlAiLCAiQ05ZIl07CmV4cG9ydCBjb25zdCBBUEkgPSAiaHR0cHM6Ly9hcGkuZnJhbmtmdXJ0ZXIuYXBwIjsK"
            emit "exchange-rate-web/index.html" ""
            emit "exchange-rate-web/package.json" "ewogICJuYW1lIjogImV4Y2hhbmdlLXJhdGUtd2ViIiwKICAidmVyc2lvbiI6ICIwLjEuMCIsCiAgInByaXZhdGUiOiB0cnVlLAogICJzY3JpcHRzIjogewogICAgImxpbnQiOiAiaHRtbGhpbnQgKiovKi5odG1sIiwKICAgICJzZXJ2ZSI6ICJucHggc2VydmUgLiIKICB9LAogICJkZXZEZXBlbmRlbmNpZXMiOiB7ICJodG1saGludCI6ICJeMS4xLjQiIH0KfQo="
            emit "exchange-rate-web/style.css" ""
          fi
          echo "=== 생성 결과 ==="
          find mcp-system-monitor-server intellij-system-monitor-plugin noc-dashboard exchange-rate-web -type f 2>/dev/null | sort || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: scaffold service files (${{ github.event.inputs.services }})"
          branch: scaffold/services
          delete-branch: true
          title: "Scaffold: 서비스 폴더/파일 대량 생성"
          body: "workflow_dispatch로 서비스 골격 생성. 대상: ${{ github.event.inputs.services }}"
