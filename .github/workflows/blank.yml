            emit "exchange-rate-web/style.css" ""
          fi
          chmod +x */run.sh */scripts/*.sh */run-cli.sh 2>/dev/null || true
          echo done

      - name: Commit & push (mode=commit)
        if: ${{ github.event.inputs.mode != 'pull_request' }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet && git diff --cached --quiet; then echo "변경 없음"; exit 0; fi
          BR="${{ github.event.inputs.target_branch }}"; git checkout -B "$BR"; git add -A
          git commit -m "chore: scaffold services"; git push --force-with-lease origin "$BR"

      - name: Create Pull Request (mode=pull_request)
        if: ${{ github.event.inputs.mode == 'pull_request' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: scaffold/services
          delete-branch: true
          title: "Scaffold: 서비스 대량 생성"
          body: "대상: ${{ github.event.inputs.services }}"
