name: MCP Build & Develop

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:          # 수동 실행 버튼 (개발 중 즉시 검증용)

permissions:
  contents: write
  security-events: write      # CodeQL 결과 업로드에 필요

concurrency:                  # 같은 브랜치 중복 실행은 이전 것 취소(자원 절약)
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'

jobs:
  # 1) 매트릭스 빌드 & 테스트 (여러 JDK에서 검증 → 새 기능 추가해도 안전)
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '17', '21' ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build & Test
        run: ./gradlew build --no-daemon
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-jdk${{ matrix.java }}
          path: build/reports/tests/test/
      - name: Upload jar
        if: matrix.java == env.JAVA_VERSION
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          if-no-files-found: ignore

  # 2) MCP 프로토콜 스모크 테스트 (실제 서버를 띄워 도구 응답 검증)
  mcp-smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - run: chmod +x gradlew
      - name: Install distribution
        run: ./gradlew installDist --no-daemon
      - name: tools/list 응답 검증
        run: |
          BIN=build/install/mcp-system-monitor-server/bin/mcp-system-monitor-server
          OUT=$(echo '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' | "$BIN")
          echo "$OUT"
          echo "$OUT" | grep -q '"system_status"' || { echo "::error::tools/list 검증 실패"; exit 1; }
      - name: tools/call 응답 검증
        run: |
          BIN=build/install/mcp-system-monitor-server/bin/mcp-system-monitor-server
          REQ='{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"system_status","arguments":{}}}'
          OUT=$(echo "$REQ" | "$BIN")
          echo "$OUT"
          echo "$OUT" | grep -q '"System Status"' || { echo "::error::tools/call 검증 실패"; exit 1; }

  # 3) 코드 품질 (정적 분석)
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - run: chmod +x gradlew
      - name: Compile check
        run: ./gradlew compileJava compileTestJava --no-daemon

  # 4) 보안 스캔 (의존성 + CodeQL)
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: CodeQL analysis
        uses: github/codeql-action/analyze@v3

  # 5) 릴리스 (v* 태그 푸시 시, 위 잡 성공 후 배포본 생성)
  release:
    needs: [ build, mcp-smoke-test, code-quality, security ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - run: chmod +x gradlew
      - name: Build distribution
        run: ./gradlew installDist --no-daemon
      - name: Package distribution
        run: |
          cd build/install
          zip -r ../../mcp-system-monitor-server.zip mcp-system-monitor-server
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mcp-system-monitor-server.zip
          generate_release_notes: true
